[package]
name = "rust_iso20022"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
description = "ISO 20022 message definitions and external code sets for Rust, generated from the official XSD schemas."
repository = "https://github.com/rust-iso/rust_iso20022"
license = "Apache-2.0"
keywords = ["ISO20022", "SWIFT", "payments", "finance", "iso"]
categories = ["data-structures", "encoding", "finance"]
documentation = "https://docs.rs/rust_iso20022/"
# The XSD sources and code-generation tooling are not needed by downstream
# crates; keep them out of the published package.
exclude = ["xsds/", "tools/", "thrdpty/", "a.rs"]

# The codegen tooling (which has a git dependency) lives in a separate,
# unpublished crate so the published `rust_iso20022` has no git dependencies.
[workspace]
members = ["tools/codegen"]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = []
# The generated, strongly-typed ISO 20022 message model. Compiling all ~722
# yaserde modules at once is very slow, so the model is split per business area:
# enable only the families you need (e.g. `model-pacs`), or `model` for all.
# `__model` is internal: any `model-<area>` turns it on to expose `generated`.
__model = []
model-acmt = ["__model"]
model-admi = ["__model"]
model-auth = ["__model"]
model-caaa = ["__model"]
model-caad = ["__model"]
model-caam = ["__model"]
model-cafc = ["__model"]
model-cafm = ["__model"]
model-cafr = ["__model"]
model-cain = ["__model"]
model-camt = ["__model"]
model-canm = ["__model"]
model-casp = ["__model"]
model-casr = ["__model"]
model-catm = ["__model"]
model-catp = ["__model"]
model-colr = ["__model"]
model-fxtr = ["__model"]
model-head = ["__model"]
model-pacs = ["__model"]
model-pain = ["__model"]
model-reda = ["__model"]
model-remt = ["__model"]
model-secl = ["__model"]
model-seev = ["__model"]
model-semt = ["__model"]
model-sese = ["__model"]
model-setr = ["__model"]
model-trck = ["__model"]
model-tsin = ["__model"]
model-tsmt = ["__model"]
model-tsrv = ["__model"]
# All families at once (slow to compile; ~722 message modules).
model = [
    "model-acmt", "model-admi", "model-auth", "model-caaa", "model-caad",
    "model-caam", "model-cafc", "model-cafm", "model-cafr", "model-cain",
    "model-camt", "model-canm", "model-casp", "model-casr", "model-catm",
    "model-catp", "model-colr", "model-fxtr", "model-head", "model-pacs",
    "model-pain", "model-reda", "model-remt", "model-secl", "model-seev",
    "model-semt", "model-sese", "model-setr", "model-trck", "model-tsin",
    "model-tsmt", "model-tsrv",
]
# Serde + JSON support. Adds serde to the core/catalogue types (which serialize
# to canonical strings) and to every generated message type, enabling
# `to_json` / `from_json`.
serde = ["dep:serde", "dep:serde_json"]
# The runtime ISO 20022 catalogue scraper (pulls tokio/reqwest/regex).
catalogue = ["dep:tokio", "dep:reqwest", "dep:regex"]
# Command-line tool (`iso20022` binary) for querying the message catalogue.
cli = ["dep:prettytable-rs"]
# Typed conversions for scalar values (amounts -> Decimal, dates -> chrono).
convert = ["dep:rust_decimal", "dep:chrono"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
log = "0.4"
phf = { version = "0.14", features = ["macros"] }
# Pinned to 0.7: the generated model and the `tools/codegen` pipeline target
# yaserde 0.7's derive semantics (namespace/prefix/flatten handling). yaserde
# 0.8+ changed the derive macro incompatibly (its 0.12 derive panics on the
# generated attributes), so moving up needs a full regenerate + re-validation.
yaserde = "0.7"
yaserde_derive = "0.7"
# Referenced as `xml::...` by the generated `simple_type!` yaserde impls.
xml-rs = "0.8"

# Optional: serde + JSON support.
serde = { version = "1", features = ["derive"], optional = true }
serde_json = { version = "1", optional = true }

# Optional: CLI (feature = "cli").
prettytable-rs = { version = "0.10", optional = true }

# Optional: typed scalar conversions (feature = "convert").
rust_decimal = { version = "1", optional = true }
chrono = { version = "0.4", default-features = false, features = ["std"], optional = true }

# Optional: runtime catalogue scraper (feature = "catalogue").
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "fs"], optional = true }
reqwest = { version = "0.13", features = ["json"], optional = true }
regex = { version = "1", optional = true }

[[bin]]
name = "iso20022"
path = "src/bin/iso20022.rs"
required-features = ["cli"]

[dev-dependencies]
serde_json = "1"

# WASM/JS bindings (compiled only for wasm32 with `--cfg direct_wasm`; see
# scripts/build-wasm.sh). Both crates are on crates.io, so they don't affect
# publishing.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(direct_wasm)'] }
